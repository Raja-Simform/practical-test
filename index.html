<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./src/index.ts" type="module"></script>
    <style>
        :root {
            --primary: #64ce72;
            --secondary: #0e0aee;
            --player1: #f72585;
            --player2: #4cc9f0;
            --correct: #2ec4b6;
            --wrong: #e63946; 
            --neutral: #f8f9fa; 
            --dark: #212529; 
        } 
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
            color: var(--dark);
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1, h2, h3 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--secondary);
        }
        
        button {
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: var(--secondary);
        }
        
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        #home-screen {
            text-align: center;
        }
        
        #game-screen {
            display: none;
        }
        
        #play-screen {
            display: none;
            text-align: center;
        }
        
        #play-screen select {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        
        .player-badges {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        
        .player-badge {
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            width: 45%;
        }
        
        .player-1 {
            background-color: var(--player1);
            color: white;
        }
        
        .player-2 {
            background-color: var(--player2);
            color: white;
        }
        
        .active-player {
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
            border: 1px solid black;
        }
        
        
        .time-remaining {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: var(--secondary);
        }
        
        .question-container {
            margin: 20px 0;
            padding: 20px;
            background-color: var(--neutral);
            border-radius: 10px;
        }
        
        .question-text {
            font-size: 20px;
            margin-bottom: 20px;
        }
        
        .question-number {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--secondary);
        }
        
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .option {
            padding: 15px;
            background-color: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            /* transition: all 0.2s; */
            text-align: center;
        }
        
        .option:hover {
            border-color: var(--primary);
            /* transform: translateY(-2px); */
        }
        
        .selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .correct {
            background-color: var(--correct);
            color: white;
            border-color: var(--correct);
        }
        
        .wrong {
            background-color: var(--wrong);
            color: white;
            border-color: var(--wrong);
        }
        
        #results-screen {
            display: none;
            text-align: center;
        }
        
        .results-container {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }
        
        .result-card {
            width: 45%;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        
        .result-card h3 {
            margin-bottom: 15px;
        }
        
        .winner {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        
        .save-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--correct);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: none;
        }
        
        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            
            .player-badges {
                flex-direction: column;
                gap: 10px;
            }
            
            .player-badge {
                width: 100%;
            }
            
            .results-container {
                flex-direction: column;
                gap: 20px;
            }
            
            .result-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="home-screen" class="container">
        <h1>Two-Player Quiz Challenge</h1>
        <p>Test your knowledge against each other in this exciting quiz game!</p>
        <div class="btn-container">
            <button id="new-btn">New Game</button>
            <button id="resume-btn" disabled>Resume Game</button>
        </div>
    </div>
 
    <div id="play-screen" class="container">
        <h2>Game Configuration</h2>
        <div>
            <label for="player1-name">Player 1 Name:</label>
            <input type="text" id="player1-name" placeholder="Player 1" required>
        </div>
        <div>
            <label for="player2-name">Player 2 Name:</label>
            <input type="text" id="player2-name" placeholder="Player 2" required>
        </div>
  
        <div>
            <label for="difficulty-select">Difficulty:</label>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="btn-container">
            <button id="start-game-btn">Start Game</button>
        </div>
    </div>
 
    <div id="game-screen" class="container">
        <div class="player-badges">
            <div id="player1-badge" class="player-badge player-1">
                <div id="player1-name-display">Player 1</div>
                <div>Score: <span id="player1-score">0</span></div>
            </div>
            <div id="player2-badge" class="player-badge player-2">
                <div id="player2-name-display">Player 2</div>
                <div>Score: <span id="player2-score">0</span></div>
            </div>
        </div>
 
        <div class="time-remaining">Time: <span id="time-display">10</span>s</div>
 
        <div class="question-container">
            <div class="question-number">Question <span id="question-number">1</span> of 10</div>
            <div id="question-text" class="question-text">Qu</div>
            <div id="options-container" class="options-container">
               <!-- optionss------------- -->
            </div>
        </div>
 
        <div class="btn-container">
            <button id="submit-btn" disabled>Submit</button>
            <button id="save-btn">Save Game</button>
        </div>
    </div>
 
    <div id="results-screen" class="container">
        <h2>Game Results</h2>
        <div class="results-container">
            <div id="player1-result" class="result-card player-1">
                <h3 id="player1-result-name">Player 1</h3>
                <p>Score: <span id="player1-final-score">0</span>/10</p>
                <p>Correct Answers: <span id="player1-correct">0</span></p>
            </div>
            <div id="player2-result" class="result-card player-2">
                <h3 id="player2-result-name">Player 2</h3>
                <p>Score: <span id="player2-final-score">0</span>/10</p>
                <p>Correct Answers: <span id="player2-correct">0</span></p>
            </div>
        </div>
        <div id="winner-announcement">
            <h2>Winner: <span id="winner-name">Player 1</span></h2>
        </div>
        <div class="btn-container">
            <button id="play-again-btn">Play Again</button>
            <button id="home-btn">Back to Home</button>
        </div>
    </div>
 
   
 
</body>
</html>
